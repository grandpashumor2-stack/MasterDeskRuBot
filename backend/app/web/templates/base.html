<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>{% block title %}МастерДеск{% endblock %}</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
  [x-cloak] { display: none !important; }
  .sidebar-link { @apply flex items-center gap-3 px-4 py-2.5 rounded-lg text-sm font-medium transition-colors; }
  .sidebar-link.active { @apply bg-blue-600 text-white; }
  .sidebar-link:not(.active) { @apply text-gray-300 hover:bg-gray-700 hover:text-white; }
  /* Mobile bottom nav */
  .bottom-nav-item { @apply flex flex-col items-center justify-center gap-0.5 flex-1 py-2 text-xs text-gray-400 transition-colors; }
  .bottom-nav-item.active { @apply text-blue-500; }
</style>
</head>
<body class="bg-gray-50 text-gray-900">
{% block body %}{% endblock %}
</body>
</html>
