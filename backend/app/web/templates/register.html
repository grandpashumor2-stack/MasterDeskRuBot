{% extends "base.html" %}
{% block title %}Регистрация — AutoService AI{% endblock %}
{% block body %}
<div class="min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100 flex items-center justify-center p-4">
  <div class="bg-white rounded-2xl shadow-xl w-full max-w-md p-8">
    <div class="text-center mb-6">
      <div class="w-12 h-12 bg-blue-600 rounded-xl flex items-center justify-center mx-auto mb-3">
        <svg class="w-7 h-7 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
      </div>
      <h1 class="text-2xl font-bold text-gray-900">Создать аккаунт</h1>
      <p class="text-sm text-gray-500 mt-1">7 дней бесплатно — без карты</p>
    </div>
    <div id="error-msg" class="hidden mb-4 p-3 bg-red-50 border border-red-200 text-red-700 rounded-lg text-sm"></div>
    <div id="success-msg" class="hidden mb-4 p-3 bg-green-50 border border-green-200 text-green-700 rounded-lg text-sm"></div>
    <form id="regForm" class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Название автосервиса *</label>
        <input type="text" name="company_name" required placeholder="СТО Авторемонт"
          class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Ваше имя *</label>
        <input type="text" name="full_name" required placeholder="Иван Иванов"
          class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Email *</label>
        <input type="email" name="email" required placeholder="ivan@example.com"
          class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Телефон сервиса</label>
        <input type="tel" name="phone" placeholder="+7 (999) 123-45-67"
          class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Пароль *</label>
        <input type="password" name="password" required minlength="8" placeholder="Минимум 8 символов"
          class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
      </div>
      <button type="submit"
        class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 rounded-lg transition-colors text-sm">
        🚀 Начать 7-дневный триал бесплатно
      </button>
    </form>
    <p class="mt-4 text-center text-sm text-gray-500">
      Уже есть аккаунт? <a href="/" class="text-blue-600 hover:underline">Войти</a>
    </p>
  </div>
</div>
<script>
document.getElementById('regForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const fd = new FormData(e.target);
  const data = Object.fromEntries(fd.entries());
  const errEl = document.getElementById('error-msg');
  const sucEl = document.getElementById('success-msg');
  errEl.classList.add('hidden');
  sucEl.classList.add('hidden');
  try {
    const resp = await fetch('/api/v1/auth/register', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(data)
    });
    const json = await resp.json();
    if (!resp.ok) { errEl.textContent = json.detail || 'Ошибка регистрации'; errEl.classList.remove('hidden'); return; }
    const form = new FormData();
    form.append('username', data.email);
    form.append('password', data.password);
    await fetch('/login', { method: 'POST', body: new URLSearchParams(form), redirect: 'follow' });
    window.location.href = '/dashboard';
  } catch(err) { errEl.textContent = 'Ошибка сети: ' + err.message; errEl.classList.remove('hidden'); }
});
</script>
{% endblock %}
