worker_processes auto;
error_log /var/log/nginx/error.log warn;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';
    access_log /var/log/nginx/access.log main;

    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 10m;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript;

    upstream api {
        server api:8000;
        keepalive 32;
    }

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=10r/m;

    # ---------------------------------------------------------------
    # 1) Bare IP — no longer served directly. Everything redirects to
    #    the HTTPS domain (the old hardcoded http://217.12.37.18 link
    #    in the bot has been retired, so there's no reason left to
    #    serve plain HTTP here).
    # ---------------------------------------------------------------
    server {
        listen 80;
        server_name 217.12.37.18;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # локальный healthcheck.sh стучится сюда как http://localhost/health —
        # не редиректим, чтобы мониторинг не считал сайт лежащим
        location /health {
            proxy_pass http://api/health;
            access_log off;
        }

        location / {
            return 301 https://master-desk.ru$request_uri;
        }
    }

    # ---------------------------------------------------------------
    # 2) Domain on port 80 — only serves ACME challenge + redirects
    #    everything else to HTTPS.
    # ---------------------------------------------------------------
    server {
        listen 80;
        server_name master-desk.ru www.master-desk.ru;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ---------------------------------------------------------------
    # 3) Domain on port 443 — the real HTTPS site.
    # ---------------------------------------------------------------
    server {
        listen 443 ssl;
        http2 on;
        server_name master-desk.ru www.master-desk.ru;

        ssl_certificate     /etc/letsencrypt/live/master-desk.ru/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/master-desk.ru/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        add_header X-Content-Type-Options nosniff;
        add_header X-Frame-Options DENY;
        add_header X-XSS-Protection "1; mode=block";
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        location /api/v1/auth/ {
            limit_req zone=auth burst=5 nodelay;
            proxy_pass http://api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }

        location /static/ {
            proxy_pass http://api;
            expires 7d;
            add_header Cache-Control "public, immutable";
        }

        location /health {
            proxy_pass http://api/health;
            access_log off;
        }

        location / {
            proxy_pass http://api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }
    }
}
